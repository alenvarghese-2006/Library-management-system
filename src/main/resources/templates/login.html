<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chris Library</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Global JS -->
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body class="auth-container">

<div class="auth-card glass-panel">
    <div class="brand">
        <i class="bi bi-book-half"></i>
        <h2>Chris Library</h2>
        <p>Enter your credentials to sign in</p>
    </div>

    <!-- Alert Messages -->
    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 border-0 bg-danger-subtle text-danger mb-3" style="font-size: 13.5px; border-radius: var(--radius-sm);">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>Invalid username or password.</span>
    </div>
    
    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 border-0 bg-success-subtle text-success mb-3" style="font-size: 13.5px; border-radius: var(--radius-sm);">
        <i class="bi bi-check-circle-fill"></i>
        <span>You have logged out successfully.</span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border-glass"><i class="bi bi-person text-secondary"></i></span>
                <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border-glass"><i class="bi bi-lock text-secondary"></i></span>
                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter password" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 justify-content-center mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

        <div class="text-center">
            <span class="text-secondary" style="font-size: 13.5px;">Don't have an account? </span>
            <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color: var(--color-brand); font-size: 13.5px;">Register here</a>
        </div>
    </form>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
