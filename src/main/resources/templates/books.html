<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Books - book rockstar')}">
</head>
<body>

<div th:replace="~{layout :: app-frame('books', ~{::#books-content})}">
    <div id="books-content">
        <!-- Page Title Trigger -->
        <span th:text="Books" class="d-none" id="title-text-hidden"></span>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const targetHeader = document.querySelector("header .page-title");
                if (targetHeader) {
                    targetHeader.textContent = "Books Inventory";
                }
            });
        </script>

        <!-- Search and Action Bar -->
        <div class="glass-panel p-4 mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-lg-5 col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-glass"><i class="bi bi-search text-secondary"></i></span>
                        <input type="text" id="book-search-input" class="form-control border-start-0" placeholder="Search by ISBN, title, author, category...">
                    </div>
                </div>
                
                <div class="col-lg-3 col-md-6">
                    <select id="book-category-filter" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Category</option>
                    </select>
                </div>

                <div class="col-lg-4 text-md-end text-start ms-auto" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#add-book-modal">
                        <i class="bi bi-journal-plus"></i> Add New Book
                    </button>
                </div>
            </div>
        </div>

        <!-- Books Table Card -->
        <div class="glass-panel p-4">
            <div class="table-responsive">
                <table class="custom-table" id="books-table">
                    <thead>
                    <tr>
                        <th>ISBN</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Publisher</th>
                        <th>Category</th>
                        <th>Qty</th>
                        <th>Available</th>
                        <th sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="books-table-body">
                    <tr th:each="book : ${books}" th:id="'book-row-' + ${book.id}">
                        <td class="font-monospace" th:text="${book.isbn}">ISBN</td>
                        <td class="fw-semibold text-primary-theme" th:text="${book.title}">Title</td>
                        <td th:text="${book.author}">Author</td>
                        <td th:text="${book.publisher}">Publisher</td>
                        <td><span class="badge badge-brand" th:text="${book.category}">Category</span></td>
                        <td th:text="${book.quantity}">0</td>
                        <td>
                            <span th:text="${book.availableQuantity}" 
                                  th:class="${book.availableQuantity > 0 ? 'badge badge-success' : 'badge badge-danger'}">0</span>
                        </td>
                        <td sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
                            <div class="d-flex gap-2">
                                <button class="btn btn-secondary btn-sm p-1 px-2 edit-book-btn" th:data-id="${book.id}" title="Edit book">
                                    <i class="bi bi-pencil-fill"></i>
                                </button>
                                <button class="btn btn-secondary btn-sm p-1 px-2 text-danger delete-book-btn" th:data-id="${book.id}" title="Delete book">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(books)}" id="no-books-row">
                        <td colspan="8" class="text-center text-muted py-4">No books registered in the catalog.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Book Modal -->
        <div class="modal fade" id="add-book-modal" tabindex="-1" aria-hidden="true" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-panel">
                    <div class="modal-header">
                        <h5 class="modal-title">Add New Book</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: var(--theme-close-btn);"></button>
                    </div>
                    <form id="add-book-form">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="add-isbn" class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="add-isbn" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-title" class="form-label">Book Title</label>
                                <input type="text" class="form-control" id="add-title" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-author" class="form-label">Author</label>
                                <input type="text" class="form-control" id="add-author" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-publisher" class="form-label">Publisher</label>
                                <input type="text" class="form-control" id="add-publisher" required>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-8 mb-3">
                                    <label for="add-category" class="form-label">Category</label>
                                    <input type="text" class="form-control" id="add-category" placeholder="e.g. Science, Fiction" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="add-quantity" class="form-label">Quantity</label>
                                    <input type="number" class="form-control" id="add-quantity" min="1" value="1" required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Book</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Edit Book Modal -->
        <div class="modal fade" id="edit-book-modal" tabindex="-1" aria-hidden="true" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_LIBRARIAN')">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content glass-panel">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Book Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="edit-book-form">
                        <input type="hidden" id="edit-book-id">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="edit-isbn" class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="edit-isbn" required>
                            </div>
                            <div class="mb-3">
                                <label for="edit-title" class="form-label">Book Title</label>
                                <input type="text" class="form-control" id="edit-title" required>
                            </div>
                            <div class="mb-3">
                                <label for="edit-author" class="form-label">Author</label>
                                <input type="text" class="form-control" id="edit-author" required>
                            </div>
                            <div class="mb-3">
                                <label for="edit-publisher" class="form-label">Publisher</label>
                                <input type="text" class="form-control" id="edit-publisher" required>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-8 mb-3">
                                    <label for="edit-category" class="form-label">Category</label>
                                    <input type="text" class="form-control" id="edit-category" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="edit-quantity" class="form-label">Quantity</label>
                                    <input type="number" class="form-control" id="edit-quantity" min="1" required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Update Book</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Books JavaScript Controller -->
<script th:src="@{/js/books.js}" defer></script>
</body>
</html>
